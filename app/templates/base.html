<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodPlays</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎮 GoodPlays</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Lógica global de autenticação no Frontend
        function checkAuth() {
            const token = localStorage.getItem("token");
            const navLinks = document.getElementById("nav-links");

            if (token) {
                navLinks.innerHTML = `
                    <li class="nav-item"><a class="nav-link" href="/games">Biblioteca Geral</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-warning" href="/my-progress">Meus Progressos</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Sair</a></li>
                `;
            } else {
                navLinks.innerHTML = `
                    <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Cadastrar</a></li>
                `;
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }

        document.addEventListener("DOMContentLoaded", checkAuth);
    </script>
</body>
</html>
