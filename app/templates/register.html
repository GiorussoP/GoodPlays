{% extends "base.html" %}

{% block title %}Register - GoodPlays{% endblock %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">
                    <i class="fas fa-user-plus"></i> Create Account
                </h2>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username"
                            placeholder="Choose a username"
                            required
                        >
                        <small class="form-text text-muted">At least 3 characters</small>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email"
                            placeholder="Enter your email"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password"
                            placeholder="Create a strong password"
                            required
                        >
                        <small class="form-text text-muted">At least 8 characters recommended</small>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                    </div>

                    <div id="errorAlert" class="alert alert-danger alert-dismissible fade show d-none" role="alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="errorMessage"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div id="loadingSpinner" class="text-center d-none mb-3">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-user-check"></i> Create Account
                        </button>
                    </div>
                </form>

                <hr>
                <p class="text-center mb-0">
                    Already have an account? 
                    <a href="/login" class="text-decoration-none">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const loadingSpinner = document.getElementById('loadingSpinner');
    
    // Validate
    if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorAlert.classList.remove('d-none');
        return;
    }
    
    if (password.length < 6) {
        errorMessage.textContent = 'Password must be at least 6 characters';
        errorAlert.classList.remove('d-none');
        return;
    }
    
    if (username.length < 3) {
        errorMessage.textContent = 'Username must be at least 3 characters';
        errorAlert.classList.remove('d-none');
        return;
    }
    
    errorAlert.classList.add('d-none');
    loadingSpinner.classList.remove('d-none');
    
    try {
        const response = await fetch('/users/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Registration failed');
        }
        
        // Registration successful, redirect to login
        setTimeout(() => {
            window.location.href = '/login?message=Registration successful! Please log in.';
        }, 500);
        
    } catch (error) {
        loadingSpinner.classList.add('d-none');
        errorMessage.textContent = error.message;
        errorAlert.classList.remove('d-none');
    }
});
</script>
{% endblock %}
