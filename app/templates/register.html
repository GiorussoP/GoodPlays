{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Cadastro</h3>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Criar Conta</button>
                </form>
                <div id="alert-msg" class="mt-3 text-center text-danger"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch("/users/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("Conta criada com sucesso! Faça login.");
        window.location.href = "/login";
    } else {
        const error = await response.json();
        document.getElementById("alert-msg").innerText = error.detail || "Erro ao cadastrar.";
    }
});
</script>
{% endblock %}
