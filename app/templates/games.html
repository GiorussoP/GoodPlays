{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h2>Biblioteca de Jogos</h2>
    </div>
    <div class="col-md-4">
        <input type="text" id="search-input" class="form-control" placeholder="Buscar jogo..." onkeyup="searchGames()">
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div id="games-list" class="row g-3">
            </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">Adicionar Novo Jogo</div>
            <div class="card-body">
                <form id="add-game-form">
                    <div class="mb-2">
                        <input type="text" id="g-title" class="form-control" placeholder="Título" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" id="g-developer" class="form-control" placeholder="Desenvolvedora">
                    </div>
                    <div class="mb-2">
                        <input type="text" id="g-genre" class="form-control" placeholder="Gênero">
                    </div>
                    <div class="mb-2">
                        <input type="number" id="g-year" class="form-control" placeholder="Ano de Lançamento">
                    </div>
                    <div class="mb-2">
                        <textarea id="g-desc" class="form-control" placeholder="Descrição"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Salvar Jogo</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login"; // Protege a página no frontend

    async function fetchGames(query = "") {
        const endpoint = query ? `/games/search/?q=${query}` : "/games/";

        const response = await fetch(endpoint, {
            headers: { "Authorization": `Bearer ${token}` }
        });

        if (response.ok) {
            const games = await response.json();
            const container = document.getElementById("games-list");
            container.innerHTML = "";

            games.forEach(game => {
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${game.title}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">${game.developer || 'N/A'} - ${game.genre || 'N/A'} (${game.release_year || ''})</h6>
                                <p class="card-text small">${game.description || 'Sem descrição.'}</p>

                                <hr>
                                <div class="input-group input-group-sm mb-3">
                                    <span class="input-group-text">Progresso %</span>
                                    <input type="number" id="prog-${game.id}" class="form-control" min="0" max="100" placeholder="Ex: 50">
                                    <button class="btn btn-outline-success" type="button" onclick="saveProgress(${game.id})">Salvar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    }

    // Nova função para salvar o progresso
    async function saveProgress(gameId) {
        const percentage = document.getElementById(`prog-${gameId}`).value;

        if (percentage === "" || percentage < 0 || percentage > 100) {
            alert("Por favor, insira um valor válido entre 0 e 100.");
            return;
        }

        const data = {
            game_id: gameId,
            progress_percentage: parseInt(percentage),
            last_played_at: new Date().toISOString().split('T')[0] // Data atual (YYYY-MM-DD)
        };

        const response = await fetch("/progress/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("Progresso salvo com sucesso!");
        } else {
            const error = await response.json();
            alert(error.detail || "Erro ao salvar progresso. Talvez você já tenha registrado para este jogo?");
        }
    }

    // Busca de jogos
    function searchGames() {
        const query = document.getElementById("search-input").value;
        fetchGames(query);
    }

    // Adicionar Jogo
    document.getElementById("add-game-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            title: document.getElementById("g-title").value,
            developer: document.getElementById("g-developer").value || null,
            genre: document.getElementById("g-genre").value || null,
            release_year: parseInt(document.getElementById("g-year").value) || null,
            description: document.getElementById("g-desc").value || null
        };

        const response = await fetch("/games/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            document.getElementById("add-game-form").reset();
            fetchGames(); // Atualiza a lista
        } else {
            const error = await response.json();
            alert(error.detail || "Erro ao adicionar jogo");
        }
    });

    // Carrega a lista ao abrir a página
    fetchGames();
</script>
{% endblock %}
