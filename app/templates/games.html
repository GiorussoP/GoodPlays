{% extends "base.html" %}

{% block title %}Games - GoodPlays{% endblock %}

{% block content %}
<div class="mb-5">
    <h1 class="mb-4">
        <i class="fas fa-dice"></i> Browse Games
    </h1>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input 
                    type="text" 
                    class="form-control" 
                    id="searchInput" 
                    placeholder="Search games by title..."
                >
                <button class="btn btn-primary" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>
        <div class="col-md-3">
            <select class="form-select" id="genreFilter">
                <option value="">All Genres</option>
                <option value="Action">Action</option>
                <option value="RPG">RPG</option>
                <option value="Strategy">Strategy</option>
                <option value="Adventure">Adventure</option>
                <option value="Sports">Sports</option>
                <option value="Puzzle">Puzzle</option>
                <option value="Horror">Horror</option>
                <option value="Simulation">Simulation</option>
            </select>
        </div>
        <div class="col-md-3">
            <button class="btn btn-success w-100" id="addGameBtn" style="display: none;">
                <i class="fas fa-plus"></i> Add New Game
            </button>
        </div>
    </div>

    <div id="gamesContainer" class="row">
        <div class="col-12 text-center">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<!-- Add Game Modal -->
<div class="modal fade" id="addGameModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Game</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addGameForm">
                    <div class="mb-3">
                        <label for="gameTitle" class="form-label">Title</label>
                        <input type="text" class="form-control" id="gameTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="gameDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="gameDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="gameDeveloper" class="form-label">Developer</label>
                        <input type="text" class="form-control" id="gameDeveloper">
                    </div>
                    <div class="mb-3">
                        <label for="gameGenre" class="form-label">Genre</label>
                        <input type="text" class="form-control" id="gameGenre">
                    </div>
                    <div class="mb-3">
                        <label for="gameYear" class="form-label">Release Year</label>
                        <input type="number" class="form-control" id="gameYear" min="1980" max="2100">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="submitAddGameBtn">Add Game</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
let allGames = [];

document.addEventListener('DOMContentLoaded', async () => {
    checkAuthState();
    await loadGames();
    
    // Event listeners
    document.getElementById('searchBtn').addEventListener('click', filterGames);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') filterGames();
    });
    document.getElementById('genreFilter').addEventListener('change', filterGames);
    document.getElementById('addGameBtn').addEventListener('click', () => {
        new bootstrap.Modal(document.getElementById('addGameModal')).show();
    });
    document.getElementById('submitAddGameBtn').addEventListener('click', submitAddGame);
});

async function loadGames() {
    try {
        allGames = await getGames();
        displayGames(allGames);
    } catch (error) {
        console.error('Error loading games:', error);
        document.getElementById('gamesContainer').innerHTML = 
            '<div class="col-12 alert alert-danger">Failed to load games</div>';
    }
}

function displayGames(games) {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';
    
    if (games.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-muted"><p>No games found</p></div>';
        return;
    }
    
    games.forEach(game => {
        const col = document.createElement('div');
        col.className = 'col-md-6 col-lg-4 mb-4';
        col.innerHTML = `
            <div class="card game-card h-100">
                <div class="card-body">
                    <h5 class="card-title">${escapeHtml(game.title)}</h5>
                    <p class="card-text text-muted small">${escapeHtml(game.developer || 'Unknown')}</p>
                    <p class="card-text small">${escapeHtml((game.description || 'No description').substring(0, 80))}...</p>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="badge bg-info">${game.genre || 'N/A'}</span>
                        <small class="text-muted">${game.release_year || 'N/A'}</small>
                    </div>
                    <a href="/game/${game.id}" class="btn btn-sm btn-primary w-100">
                        <i class="fas fa-eye"></i> View Details
                    </a>
                </div>
            </div>
        `;
        container.appendChild(col);
    });
}

function filterGames() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const genre = document.getElementById('genreFilter').value;
    
    let filtered = allGames.filter(game => {
        const matchTitle = game.title.toLowerCase().includes(searchTerm) || 
                          game.developer.toLowerCase().includes(searchTerm);
        const matchGenre = !genre || game.genre === genre;
        return matchTitle && matchGenre;
    });
    
    displayGames(filtered);
}

async function submitAddGame() {
    const token = localStorage.getItem('access_token');
    if (!token) {
        alert('Please log in first');
        return;
    }
    
    const game = {
        title: document.getElementById('gameTitle').value,
        description: document.getElementById('gameDescription').value,
        developer: document.getElementById('gameDeveloper').value,
        genre: document.getElementById('gameGenre').value,
        release_year: parseInt(document.getElementById('gameYear').value) || null
    };
    
    if (!game.title) {
        alert('Please enter a game title');
        return;
    }
    
    try {
        const response = await fetch('/games/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(game)
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Failed to add game');
        }
        
        bootstrap.Modal.getInstance(document.getElementById('addGameModal')).hide();
        document.getElementById('addGameForm').reset();
        await loadGames();
        alert('Game added successfully!');
        
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function checkAuthState() {
    const token = localStorage.getItem('access_token');
    document.getElementById('addGameBtn').style.display = token ? 'block' : 'none';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
